name: 'AI Playwright Test Generator'
description: 'Analyses Playwright tests using AI based on PR diffs & generates missing tests'
inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
  llm-api-key:
    description: 'API key for LLM server'
    required: true
  llm-host:
    description: 'Host address for LLM server'
    required: true
  model-id:
    description: 'Model ID to use for generation'
    required: true
  exclude-pattern:
    description: 'Optional regex pattern to exclude file paths (e.g., "^versions/")'
    required: false
  include-existing-tests:
    description: 'Include existing test files from base branch for context (true/false)'
    required: false
    default: 'false'
  test-file-suffixes:
    description: 'Comma-separated test suffixes (e.g., ".spec,.test,.e2e,.playwright")'
    required: false
    default: '.spec,.test,.e2e,.playwright'
  test-file-roots:
    description: 'Comma-separated source roots where tests are located (e.g., "src,app,packages/app")'
    required: false
    default: 'src,app,packages/app'
  include-source-files:
    description: 'Include changed source files from base branch for context (true/false)'
    required: false
    default: 'false'
  run-tests:
    description: 'Run generated tests with Playwright (true/false)'
    required: false
    default: 'false'
  app-directory:
    description: 'Path to the app directory (including package.json)'
    required: false
    default: '.'
  install-command:
    description: 'Command for installing app dependencies'
    required: false
    default: 'npm ci'
  dev-server-command:
    description: 'Command for starting the dev server'
    required: false
    default: 'npm run dev'
  dev-server-url:
    description: 'URL to use for testing the actual code'
    required: false
    default: 'http://localhost:5175'
  start-dev-server:
    description: 'Start the dev server before running tests. Set to false if playwright.config already has a webServer block (true/false)'
    required: false
    default: 'true'
  test-output-path:
    description: 'Path (relative to app-directory) where generated test file saved'
    required: false
    default: 'e2e/ai-generated.spec.ts'
  mcp-servers:
    description: 'JSON configuration for MCP server to provide the LLM with tools (e.g., {"playwright": {"command": "npx", "args": ["@playwright/mcp@latest"]}})'
    required: false
  dry-run:
    description: 'Skip LLM call and test execution, only validate diff parsing and context retrieval (true/false)'
    required: false
    default: 'false'
runs:
  using: 'node24'
  main: 'dist/index.js'